<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexibleBlocker 設定</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>FlexibleBlocker 設定</h1>
        
        <div class="section">
            <h2>新しいサイトをブロック</h2>
            <div class="input-group">
                <input type="text" id="siteInput" placeholder="ブロックしたいサイトのURLを入力" />
                <button id="analyzeUrlBtn">ブロック</button>
            </div>
            
            <!-- URL階層選択セクション -->
            <div id="urlAnalysisSection" class="url-analysis-section" style="display: none;">
                <h3>ブロック範囲を選択</h3>
                <p class="note">クリックしてブロック範囲を選択してください：</p>
                <div id="urlParts" class="url-parts"></div>
                <div class="selected-url-preview">
                    <strong>選択されたブロック対象:</strong>
                    <code id="selectedUrl"></code>
                </div>
                <button id="addSelectedBtn" class="primary-btn">この範囲をブロックに追加</button>
            </div>
            
            <div class="help-section">
                <h3>使用方法</h3>
                <ol class="help-list">
                    <li>ブロックしたいサイトの完全なURLを上の入力欄に貼り付け</li>
                    <li>「ブロック」ボタンをクリック</li>
                    <li>複数の階層がある場合は、ブロックしたい範囲をクリック</li>
                    <li>「この範囲をブロックに追加」をクリック</li>
                </ol>
                <p class="note">※ ドメインのみのURLは即座にブロックされます</p>
            </div>
        </div>
        
        <div class="section">
            <h2>ブロック中のサイト</h2>
            <div id="blockedSitesList" class="sites-list">
                <!-- ブロックされたサイトがここに表示される -->
            </div>
            <p id="noSitesMessage" class="no-sites" style="display: none;">
                ブロック中のサイトはありません
            </p>
        </div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
