<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexibleBlocker 設定</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>FlexibleBlocker 設定</h1>
        
        <div class="section">
            <h2 class="section-title">新しいサイトをブロック
                <div class="help-tooltip" data-tooltip="1. ブロックしたいサイトの完全なURLを左の入力欄に貼り付け。&#10;2. 「ブロック」ボタンをクリック。&#10;3. 複数の階層がある場合は、ブロックしたい範囲をクリック。&#10;4. 「この範囲をブロックに追加」をクリック。&#10;&#10;※ ドメインのみのURLは即座にブロックされます。">
                    <span class="help-icon">i</span>
                </div>
            </h2>
            <div class="input-group">
                <input type="text" id="siteInput" placeholder="ブロックしたいサイトのURLを入力" />
                <button id="analyzeUrlBtn">ブロック</button>
            </div>
            
            <div class="simple-time-range-section">
                <h4>ブロック時間帯</h4>
                <div class="inline-time-input-group">
                    <input type="time" id="directFromTime" value="00:00">
                    <span class="time-separator">～</span>
                    <input type="time" id="directToTime" value="23:59">
                </div>
                <p class="time-note">※ 00:00-23:59 の場合は終日ブロックされます</p>
            </div>
            
            <!-- URL階層選択セクション -->
            <div id="urlAnalysisSection" class="url-analysis-section" style="display: none;">
                <h3>ブロック範囲を選択</h3>
                <p class="note">クリックしてブロック範囲を選択してください</p>
                <div id="urlParts" class="url-parts"></div>
                <div class="selected-url-preview">
                    <strong>選択されたブロック対象:</strong>
                    <code id="selectedUrl"></code>
                </div>
                <button id="addSelectedBtn" class="primary-btn">この範囲をブロックに追加</button>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">ブロック中のサイト</h2>
            <div class="blocked-sites-count">
                ブロック中のサイト: <span id="blockedSitesCount">0</span>個
            </div>
            <div class="sites-table-container">
                <table id="blockedSitesTable" class="sites-table">
                    <tbody id="blockedSitesList">
                    </tbody>
                </table>
                <p id="noSitesMessage" class="no-sites" style="display: none;">
                    ブロック中のサイトはありません
                </p>
            </div>
        </div>
    </div>
    
    <script src="options.js"></script>
</body>
</html>
