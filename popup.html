<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexibleBlocker</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            width: 320px;
            padding: 16px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="popup-container">
        <h2>FlexibleBlocker</h2>
        
        <div id="notBlockedState" style="display: none;">
            <button id="blockCurrentSiteBtn" class="primary-btn">このサイトをブロック</button>
            <div id="blockStatusMessage" class="block-status-message" style="display: none;"></div>
        </div>
        
        <div id="alreadyBlockedState" style="display: none;">
            <p class="status blocked">✓ <span id="blockedRuleName">このサイト</span> はブロック中です</p>
            <button id="unblockCurrentSiteBtn" class="secondary-btn">ブロックを解除</button>
        </div>
        
        <!-- URL階層選択セクション -->
        <div id="urlAnalysisSection" class="url-analysis-section" style="display: none;">
            <h3>ブロック範囲を選択</h3>
            <p class="note">クリックしてブロック範囲を選択してください：</p>
            <div id="urlParts" class="url-parts"></div>
            <div class="selected-url-preview">
                <strong>選択されたブロック対象:</strong>
                <code id="selectedUrl"></code>
            </div>
            <div class="time-range-section">
                <h4>ブロック時間帯</h4>
                <div class="time-input-group">
                    <label for="fromTime">開始時刻:</label>
                    <input type="time" id="fromTime" value="00:00">
                </div>
                <div class="time-input-group">
                    <label for="toTime">終了時刻:</label>
                    <input type="time" id="toTime" value="23:59">
                </div>
                <p class="time-note">※ 00:00-23:59 の場合は終日ブロックされます</p>
            </div>
            <div class="popup-buttons">
                <button id="addSelectedBtn" class="primary-btn">この範囲をブロックに追加</button>
                <button id="cancelAnalysisBtn" class="secondary-btn">キャンセル</button>
            </div>
        </div>
        
        <hr>
        
        <div class="actions">
            <button id="openOptionsBtn" class="primary-btn">設定画面を開く</button>
        </div>
        
        <div id="blockedSitesCount" class="stats">
            ブロック中のサイト: <span id="count">0</span>個
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
