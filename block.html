<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サイトがブロックされています - FlexibleBlocker</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .block-container {
            background: white;
            padding: 28px 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            margin: 20px;
        }
        
        .block-icon {
            font-size: 64px;
            color: #ff6b6b;
        }
        
        .block-title {
            font-size: 24px;
            color: #333;
            margin-top: 8px;
            margin-bottom: 16px;
            padding-bottom: 40px;
            font-weight: 600;
        }
        
        .blocked-site {
            font-size: 16px;
            color: #666;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }
        
        #blockedUrl {
            color: #d63384;
            background: #f8f9fa;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .block-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin: 20px 0;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 0 8px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0056b3;
            text-decoration: none;
            color: white;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #545b62;
            text-decoration: none;
            color: white;
        }
        
        .settings-link {
            margin-top: 20px;
            font-size: 14px;
        }
        
        .settings-link a {
            color: #007bff;
            text-decoration: none;
        }
        
        .settings-link a:hover {
            text-decoration: underline;
        }
        
        
        .block-time-range {
            font-size: 16px;
            color: #666;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
        }
        
        .block-time-range span {
            font-weight: bold;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="block-container">
        <div class="block-icon">🚫</div>
        <h1 class="block-title">このサイトはFlexibleBlockerが<br>ブロック中です</h1>
        
        <div class="blocked-site">
            <strong id="blockedUrl">読み込み中...</strong>
        </div>
        
        <div class="block-time-range">
            ブロック対象時間帯: <span id="blockTimeRange">読み込み中...</span>
        </div>
        
        
        <div class="actions">
            <button id="openSettingsBtn" class="btn btn-primary">設定を開く</button>
        </div>
        
        <div class="settings-link">
            <a href="#" id="unblockBtn">このサイトのブロックを解除</a>
        </div>
        
    </div>
    
    <script src="common.js"></script>
    <script src="block.js"></script>
</body>
</html>
